# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Check code formatting with Spotless
        run: ./mvnw spotless:check

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@c397dc8f75a4d24ae0be621529d7f9dfe8a9f460 # v0.21.0
        with:
          installMirrorNode: true
          hieroVersion: v0.66.0
          mirrorNodeVersion: v0.138.0
          mirrorNodePortGrpc: 5600
          mirrorNodePortWeb3Rest: 8545

      - name: Wait for Mirror Node
        run: |
          echo "Waiting for Mirror Node REST API to be ready on http://localhost:38081..."
          until curl --output /dev/null --silent --head --fail http://localhost:38081/api/v1/network/supply; do
            echo "Mirror Node not ready, waiting..."
            kubectl get svc -n solo
            curl --silent http://localhost:38081/api/v1/network/supply || echo "No response from /api/v1/network/supply"
            sleep 5
          done
          echo "Mirror Node REST API is ready!"

      - name: Build with Maven
        env:
          SPRING_PROFILES_ACTIVE: solo
          HEDERA_ACCOUNT_ID: ${{ steps.solo.outputs.accountId }}
          HEDERA_PRIVATE_KEY: ${{ steps.solo.outputs.privateKey }}
          HEDERA_NETWORK: hiero-solo-action
        run: ./mvnw verify
